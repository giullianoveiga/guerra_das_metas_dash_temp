services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guerra_das_metas_app
    ports:
      - "9002:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SETTINGS_API_TOKEN=guerra_das_metas_2026
    restart: unless-stopped
    user: "1000:1000"