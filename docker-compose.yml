services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guerra_das_metas_app
    ports:
      - "9002:3000"
    volumes:
      - ./guerra_das_metas.db:/app/guerra_das_metas.db
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
